services:
  paperly:
    image: paperly-pdf-editor:latest
    build:
      context: .
      args:
        VITE_MICROSOFT_CLIENT_ID: ${VITE_MICROSOFT_CLIENT_ID:-}
        VITE_MICROSOFT_TENANT_ID: ${VITE_MICROSOFT_TENANT_ID:-common}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16m
      - /var/run:size=1m
      - /tmp:size=8m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

